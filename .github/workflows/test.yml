name: Test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Detect whether Roblox secrets are present. If not, skip the Open Cloud
      # steps with a green "skipped" status instead of a red 404. Set the three
      # secrets at github.com/agilepeter/roblox/settings/secrets/actions to
      # activate the real CI path.
      - name: Check Roblox secrets
        id: check
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          ROBLOX_UNIVERSE_ID: ${{ secrets.ROBLOX_UNIVERSE_ID }}
          ROBLOX_PLACE_ID: ${{ secrets.ROBLOX_CI_PLACE_ID }}
        run: |
          if [ -z "$ROBLOX_API_KEY" ] || [ -z "$ROBLOX_UNIVERSE_ID" ] || [ -z "$ROBLOX_PLACE_ID" ]; then
            echo "secrets_set=false" >> $GITHUB_OUTPUT
            echo "::warning::Roblox secrets not set — skipping Open Cloud test run. See docs/testing-setup.md."
          else
            echo "secrets_set=true" >> $GITHUB_OUTPUT
          fi

      # v1 CI path: ship the committed .rbxl directly to Open Cloud.
      # No Rojo build step yet — that requires source-tree migration first.
      # See docs/testing-setup.md "Option A vs B" for the upgrade path.
      - name: Publish committed .rbxl to Open Cloud
        if: steps.check.outputs.secrets_set == 'true'
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          ROBLOX_UNIVERSE_ID: ${{ secrets.ROBLOX_UNIVERSE_ID }}
          ROBLOX_PLACE_ID: ${{ secrets.ROBLOX_CI_PLACE_ID }}
        run: |
          curl -fSs -X POST "https://apis.roblox.com/universes/v1/${ROBLOX_UNIVERSE_ID}/places/${ROBLOX_PLACE_ID}/versions?versionType=Saved" \
            -H "x-api-key: ${ROBLOX_API_KEY}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @diablow.rbxl

      # Run the Diabow test suite headlessly on a real Roblox server.
      # Uses the Luau Execution API. The session blocks until script returns or
      # times out (default 30s; pass `executionTimeoutSeconds` to extend).
      - name: Run Diabow tests via Open Cloud
        if: steps.check.outputs.secrets_set == 'true'
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          ROBLOX_UNIVERSE_ID: ${{ secrets.ROBLOX_UNIVERSE_ID }}
          ROBLOX_PLACE_ID: ${{ secrets.ROBLOX_CI_PLACE_ID }}
        run: |
          RESPONSE=$(curl -fSs -X POST \
            "https://apis.roblox.com/cloud/v2/universes/${ROBLOX_UNIVERSE_ID}/places/${ROBLOX_PLACE_ID}/luau-execution-session-tasks" \
            -H "x-api-key: ${ROBLOX_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "script": "return _G.RunDiabowTests()",
              "timeout": "30s"
            }')
          echo "$RESPONSE"
          # Parse `success: true|false` from results.
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "Tests passed"; exit 0
          else
            echo "Tests failed"; exit 1
          fi
